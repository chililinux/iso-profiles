# Informações básicas
dist_name="MinhaDistro"          # Nome da distribuição
dist_version="1.0"               # Versão da ISO
displaymanager="sddm"            # Gerenciador de login
autologin="true"                 # Autologin no live environment
hostname="minhadistro-live"      # Nome do host no live
username="liveuser"              # Usuário no ambiente live

# Kernel
kernel="linux-lts"               # Kernel a ser incluído (pode ser "linux" ou outro)

# Configurações de ISO
iso_label="MINHADISTRO_1.0"      # Rótulo da ISO
iso_publisher="Minha Distro <https://minhadistro.org>"
iso_application="MinhaDistro Live Environment"
iso_version="1.0"

# Idioma e região
locales="pt_BR.UTF-8"            # Localização padrão
timezone="America/Porto_Velho"   # Fuso horário padrão

# Usuário e permissões
password="live"                  # Senha do usuário live
